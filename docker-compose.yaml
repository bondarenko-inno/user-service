
services:

  user-service-db:
    image: postgres:16
    container_name: user-service-db
    environment:
      - POSTGRES_USER=${USER_SERVICE_POSTGRES_USER}
      - POSTGRES_PASSWORD=${USER_SERVICE_POSTGRES_PASSWORD}
      - POSTGRES_DB=${USER_SERVICE_POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7.2
    container_name: user-service-redis
    environment:
      - REDIS_PASSWORD=${USER_SERVICE_REDIS_PASSWORD}
    command: [
      "redis-server",
      "--appendonly", "yes",
      "--requirepass", "${USER_SERVICE_REDIS_PASSWORD}"
    ]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  user-service:
    build:
      context: .
      dockerfile: Dockerfile-user
    container_name: user-service
    ports:
      - "8071:8071"
    environment:
      - USER_SERVICE_POSTGRES_USER=${USER_SERVICE_POSTGRES_USER}
      - USER_SERVICE_POSTGRES_PASSWORD=${USER_SERVICE_POSTGRES_PASSWORD}
      - USER_SERVICE_POSTGRES_DB=${USER_SERVICE_POSTGRES_DB}
      - USER_SERVICE_POSTGRES_HOST=${USER_SERVICE_POSTGRES_HOST}
      - USER_SERVICE_POSTGRES_PORT=${USER_SERVICE_POSTGRES_PORT}

      - USER_SERVICE_REDIS_PASSWORD=${USER_SERVICE_REDIS_PASSWORD}
      - USER_SERVICE_REDIS_HOST=${USER_SERVICE_REDIS_HOST}
      - USER_SERVICE_REDIS_PORT=${USER_SERVICE_REDIS_PORT}

      - AUTH_SERVICE_KAFKA_HOST=${AUTH_SERVICE_KAFKA_HOST}
      - AUTH_SERVICE_KAFKA_PORT=${AUTH_SERVICE_KAFKA_PORT}

      - SECRET_KEY=${SECRET_KEY}
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      - user-service-db
      - redis

volumes:
  pgdata:
  redisdata:
