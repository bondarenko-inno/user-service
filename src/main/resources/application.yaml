spring:
  liquibase:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: none

  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5433/${USER_SERVICE_POSTGRES_DB}
    username: ${USER_SERVICE_POSTGRES_USER}
    password: ${USER_SERVICE_POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

server:
  port: 8071

site:
  domain:
    url: http://127.0.0.1:${server.port}